name: Deploy Backend to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Build all modules
        run: mvn clean package -DskipTests -q

      - name: Prepare JARs for deployment
        run: |
          echo "=== JARs built ==="
          find . -path "*/target/*.jar" | sort
          mkdir -p deploy
          cp uigatewayservice/target/uigatewayservice-*.jar deploy/uigatewayservice.jar
          # Use find to pick up exec jar regardless of exact name pattern
          find otploginauth/target -name "*.jar" ! -name "original-*" | sort
          OTP_JAR=$(find otploginauth/target -name "*exec*.jar" -o -name "otploginauth-*.jar" ! -name "original-*" | grep -v "original" | tail -1)
          echo "Deploying otploginauth: $OTP_JAR"
          cp "$OTP_JAR" deploy/otploginauth.jar
          cp bookingservice/target/bookingservice-*.jar deploy/bookingservice.jar
          cp carwashrates/target/carwashrates-*.jar deploy/carwashrates.jar
          cp membership/target/membership-*.jar deploy/membership.jar

      - name: Upload JARs to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/*"
          target: "/opt/carwash/jars"
          strip_components: 1
          overwrite: true

      - name: Restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            for svc in otploginauth bookingservice carwashrates membership uigatewayservice; do
              sudo systemctl restart $svc
              sleep 12
            done
            for svc in otploginauth bookingservice carwashrates membership uigatewayservice; do
              echo "$svc: $(systemctl is-active $svc)"
            done
