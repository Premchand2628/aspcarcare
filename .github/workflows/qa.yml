name: Backend QA - Run Tests

on:
  push:
    branches: [qa]
  pull_request:
    branches: [qa]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aspcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test -q
        env:
          DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          BOOKING_PROD_DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          BOOKING_PROD_DB_USERNAME: postgres
          BOOKING_PROD_DB_PASSWORD: postgres
          RATES_PROD_DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          RATES_PROD_DB_USERNAME: postgres
          RATES_PROD_DB_PASSWORD: postgres
          MEMBERSHIP_PROD_DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          MEMBERSHIP_PROD_DB_USERNAME: postgres
          MEMBERSHIP_PROD_DB_PASSWORD: postgres
          INVITATION_PROD_DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          INVITATION_PROD_DB_USERNAME: postgres
          INVITATION_PROD_DB_PASSWORD: postgres
          PAYMENT_PROD_DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          PAYMENT_PROD_DB_USERNAME: postgres
          PAYMENT_PROD_DB_PASSWORD: postgres
          SUPPORT_PROD_DB_URL: jdbc:postgresql://localhost:5432/aspcare_test
          SUPPORT_PROD_DB_USERNAME: postgres
          SUPPORT_PROD_DB_PASSWORD: postgres
          JWT_SECRET: test-secret-key-for-ci-testing-only-not-for-production-use-1234567890
