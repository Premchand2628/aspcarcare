server:
  port: 8090

spring:
  config:
    import: optional:file:../env.properties
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

app:
  jwt:
    secret: ${CARWASHER_JWT_SECRET}
    expiration-ms: ${CARWASHER_JWT_EXPIRATION_MS}

---
# =============================================
# QA profile — ASPCare_QA DB on port 9090
# =============================================
spring:
  config:
    activate:
      on-profile: qa
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_QA

server:
  port: 9090

---
# =============================================
# Prod profile — ASPCare_prod DB on port 10090
# =============================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_prod

server:
  port: 10090