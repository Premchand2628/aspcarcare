spring:
  config:
    import: optional:file:../env.properties
  application:
    name: carwashrates
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  address: 0.0.0.0
  port: 8086

jwt:
  secret: ${JWT_SECRET:}
  issuer: ${JWT_ISSUER:}
  algorithm: ${JWT_ALGORITHM:HS256}
  public-key: ${JWT_PUBLIC_KEY:}
  access-token-minutes: 120

carwash:
  security:
    enabled: true

---
# =============================================
# QA profile — ASPCare_QA DB on port 9086
# =============================================
spring:
  config:
    activate:
      on-profile: qa
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_QA

server:
  port: 9086

---
# =============================================
# Prod profile — ASPCare_prod DB on port 10086
# =============================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_prod

server:
  port: 10086
