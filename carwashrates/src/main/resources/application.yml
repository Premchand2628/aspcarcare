spring:
  config:
    import: optional:file:../env.properties
  application:
    name: carwashrates
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      keepalive-time: 30000
      connection-timeout: 3000
      initialization-fail-timeout: 1
      pool-name: CarwashRatesHikariCP
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.batch_size: 30
        query.in_clause_parameter_padding: true
  main:
    lazy-initialization: false

server:
  address: 0.0.0.0
  port: 8086

jwt:
  secret: ${JWT_SECRET:}
  issuer: ${JWT_ISSUER:}
  algorithm: ${JWT_ALGORITHM:HS256}
  public-key: ${JWT_PUBLIC_KEY:}
  access-token-minutes: 120

carwash:
  security:
    enabled: true

---
# =============================================
# QA profile — ASPCare_QA DB on port 9086
# =============================================
spring:
  config:
    activate:
      on-profile: qa
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_QA

server:
  port: 9086

---
# =============================================
# Prod profile — ASPCare_prod DB on port 10086
# =============================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_prod

server:
  port: 10086
