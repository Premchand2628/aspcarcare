<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>PhonePe Test Simulator</title>

  <!-- Important for mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-strong: #4338ca;
      --bg-page: #020617;
      --bg-card: #020617;
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --success: #22c55e;
      --danger: #ef4444;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e293b 0, #020617 55%);
      margin: 0;
      padding: 16px;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: radial-gradient(circle at top left, #1e293b 0, #020617 50%);
      border-radius: 24px;
      padding: 24px 22px 20px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.8);
      border: 1px solid rgba(148, 163, 184, 0.45);
    }

    .logo-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
      gap: 10px;
    }

    .logo-text {
      font-weight: 600;
      letter-spacing: 0.06em;
      font-size: 13px;
      color: var(--text-muted);
      text-transform: uppercase;
      white-space: nowrap;
    }

    .merchant {
      font-size: 12px;
      color: var(--text-muted);
      text-align: right;
      flex: 1;
    }

    .amount-block {
      margin-top: 6px;
      margin-bottom: 14px;
    }

    .amount-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .amount-value {
      font-size: 26px;
      font-weight: 700;
      margin-top: 4px;
      word-break: break-word;
    }

    .txn-id {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 2px;
      word-break: break-all;
    }

    .info {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      line-height: 1.4;
    }

    .btn-row {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      padding: 10px 14px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition:
        background 0.15s ease,
        transform 0.08s ease,
        box-shadow 0.15s ease,
        opacity 0.08s ease;
      white-space: nowrap;
    }

    .btn-success {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #f0fdf4;
      box-shadow: 0 12px 24px rgba(34, 197, 94, 0.5);
    }

    .btn-success:hover {
      transform: translateY(-1px);
      box-shadow: 0 16px 36px rgba(34, 197, 94, 0.7);
    }

    .btn-fail {
      background: #111827;
      color: #fecaca;
      border: 1px solid rgba(248, 113, 113, 0.5);
    }

    .btn-fail:hover {
      background: #1f2937;
    }

    .status {
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-muted);
      min-height: 16px;
    }

    .status.error {
      color: #fecaca;
    }

    .status.success {
      color: #bbf7d0;
    }

    /* Small-screen tweaks */
    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .card {
        padding: 18px 16px 16px;
        border-radius: 20px;
      }
      .amount-value {
        font-size: 22px;
      }
      .btn {
        font-size: 12px;
        padding: 9px 10px;
      }
      .logo-text {
        font-size: 12px;
      }
      .merchant {
        font-size: 11px;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-row">
      <div class="logo-text">PhonePe Test</div>
      <div class="merchant">Merchant: CarWash</div>
    </div>

    <div class="amount-block">
      <div class="amount-label">Paying amount</div>
      <div id="amountValue" class="amount-value">₹0</div>
      <div id="txnInfo" class="txn-id"></div>
    </div>

    <div class="info">
      This is a <strong>test simulator</strong>. Choose success or failure to mimic PhonePe behavior.
      On success, CarWash backend / frontend will continue the flow.
    </div>

    <div class="btn-row">
      <button class="btn btn-success" onclick="simulate('SUCCESS')">Simulate Success</button>
      <button class="btn btn-fail" onclick="simulate('FAILED')">Simulate Failure</button>
    </div>

    <div id="statusText" class="status"></div>
  </div>

  <script>
    function getQueryParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    const txnId      = getQueryParam("txnId") || "";
    const amount     = getQueryParam("amount") || "0";
    const flowType   = getQueryParam("type") || "booking"; // booking | membership
    const successUrl = getQueryParam("successUrl");
    const failureUrl = getQueryParam("failureUrl");

    const amountEl = document.getElementById("amountValue");
    const txnInfo  = document.getElementById("txnInfo");
    const statusEl = document.getElementById("statusText");

    amountEl.textContent = "₹" + amount;
    txnInfo.textContent  = txnId ? ("Txn ID: " + txnId) : "";

    function setStatus(msg, cls) {
      statusEl.textContent = msg || "";
      statusEl.className = "status" + (cls ? " " + cls : "");
    }

    async function simulate(status) {
      if (flowType === "membership") {
        // MEMBERSHIP MODE: just bounce back to membershippayment.html (or whatever you configured)
        if (!successUrl || !failureUrl) {
          setStatus("Missing redirect URLs. Please restart payment from membership page.", "error");
          return;
        }

        if (status === "SUCCESS") {
          setStatus("Simulating membership payment success…", "success");
          setTimeout(() => {
            window.location.href = successUrl;
          }, 700);
        } else {
          setStatus("Simulating membership payment failure…", "error");
          setTimeout(() => {
            window.location.href = failureUrl;
          }, 700);
        }
        return;
      }

      
      if (!txnId) {
        setStatus("Missing transaction ID. Please start from payment page.", "error");
        return;
      }

      setStatus("Sending " + status + " to backend...", "");

      try {
        const res = await fetch("/payments/phonepe/callback", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            code: status === "SUCCESS" ? "SUCCESS" : "PAYMENT_ERROR",
            data: { merchantTransactionId: txnId }
          })
        });

        const text = await res.text();
        console.log("Callback response:", text);

        if (!res.ok) {
          setStatus("Backend reported failure: " + text, "error");
          return;
        }

        if (status === "SUCCESS") {
          setStatus("Payment success simulated. Booking created. Redirecting...", "success");
          setTimeout(() => {
            window.location.href = "/aspcare";
          }, 1500);
        } else {
          setStatus("Payment failed / cancelled. Redirecting back to payment page...", "error");
          setTimeout(() => {
            window.location.href = "/payment.html";
          }, 1500);
        }

      } catch (e) {
        console.error(e);
        setStatus("Error calling backend. Check console.", "error");
      }
    }
  </script>
</body>
</html>
