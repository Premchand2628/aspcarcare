<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Edit Profile - CarWash</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #2563eb;
      --primary-strong: #1d4ed8;
      --accent-green: #16a34a;
      --bg-dark: #020617;
      --border-soft: rgba(148, 163, 184, 0.5);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px 12px;
      color: var(--text-main);

      background-image: url("images/carwash.gif");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top, rgba(15,23,42,0.1), rgba(15,23,42,0.9)),
                  linear-gradient(to bottom right, rgba(37,99,235,0.35), rgba(15,23,42,0.95));
      z-index: 0;
    }

    .shell {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 460px;
    }

    .card {
      background: rgba(15, 23, 42, 0.96);
      border-radius: 22px;
      padding: 22px 22px 20px;
      box-shadow:
        0 22px 60px rgba(15, 23, 42, 0.95),
        0 0 0 1px rgba(30, 64, 175, 0.8);
      border: 1px solid rgba(30, 64, 175, 0.8);
      backdrop-filter: blur(10px);
      color: var(--text-main);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .title-block { display: flex; flex-direction: column; gap: 2px; }

    h2 {
      margin: 0;
      font-size: 20px;
      letter-spacing: 0.03em;
    }

    .subtitle { font-size: 12px; color: var(--text-muted); }

    .badge-pill {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.6);
      padding: 4px 10px;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(15,23,42,0.9);
      color: var(--text-muted);
      white-space: nowrap;
    }

    .dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent-green);
      box-shadow: 0 0 0 0 rgba(34,197,94,0.7);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(34,197,94,0.7); }
      70%  { box-shadow: 0 0 0 8px rgba(34,197,94,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }

    #phoneLabel { font-size: 11px; color: var(--text-muted); margin-bottom: 10px; }

    .form-row { display: flex; gap: 10px; flex-wrap: wrap; }

    .form-group { flex: 1; min-width: 140px; margin-bottom: 10px; }
    .form-group-full { width: 100%; margin-bottom: 10px; }

    label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 3px; }

    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--border-soft);
      font-size: 13px;
      background: #020617;
      color: var(--text-main);
      outline: none;
      transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
    }

    input::placeholder { color: #6b7280; }

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 1px rgba(37,99,235,0.6);
      background: #020617;
    }

    input[readonly] {
      background: rgba(15,23,42,1);
      cursor: default;
      color: #9ca3af;
    }

    .password-wrapper { position: relative; }

    .toggle-password {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      font-size: 11px;
      color: #60a5fa;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 999px;
      border: none;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, transform 0.08s, box-shadow 0.15s, opacity 0.08s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #1d4ed8);
      color: #f9fafb;
      box-shadow: 0 14px 32px rgba(37,99,235,0.85);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 18px 40px rgba(37,99,235,0.95);
    }

    .btn-secondary {
      background: rgba(15,23,42,1);
      color: var(--text-muted);
      border: 1px solid rgba(55,65,81,0.9);
    }

    .btn-secondary:hover { background: #020617; }

    .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
    .hint span { color: #e5e7eb; }

    .error-text { font-size: 11px; color: var(--danger); margin-top: 4px; display: none; }

    @media (max-width: 640px) {
      body { align-items: flex-start; padding: 16px 10px; }
      .card { padding: 18px 16px 18px; border-radius: 18px; }
      h2 { font-size: 18px; }
      .subtitle { font-size: 11px; }
      .badge-pill { font-size: 10px; padding: 3px 8px; }
      input { font-size: 12px; }
      .btn { font-size: 12px; padding: 9px 10px; }
    }

    @media (max-width: 400px) {
      body { padding: 12px 8px; }
      .card { padding: 16px 14px 16px; }
    }
  </style>
</head>
<body>

<div class="shell">
  <div class="card">
    <div class="card-header">
      <div class="title-block">
        <h2>Edit Profile</h2>
        <div class="subtitle">Update your basic details and sign-in password.</div>
      </div>
      <div class="badge-pill">
        <div class="dot"></div>
        Profile active
      </div>
    </div>

    <p id="phoneLabel"></p>

    <div class="form-row">
      <div class="form-group">
        <label for="firstName">First Name</label>
        <input type="text" id="firstName" placeholder="Enter first name">
      </div>
      <div class="form-group">
        <label for="lastName">Last Name</label>
        <input type="text" id="lastName" placeholder="Enter last name">
      </div>
    </div>

    <div class="form-group-full">
      <label for="email">Email</label>
      <input type="email" id="email" readonly>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="age">Age</label>
        <input type="number" id="age" readonly>
      </div>
      <div class="form-group">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" readonly>
      </div>
    </div>

    <div class="form-group-full">
      <label for="password">New Password</label>
      <div class="password-wrapper">
        <input type="password" id="password" placeholder="Enter new password (optional)">
        <span class="toggle-password" onclick="togglePassword()">Show</span>
      </div>
      <div class="hint">
        Use at least <span>8 characters</span> with letters and numbers for better security.
      </div>
      <div id="errorText" class="error-text">Password cannot be empty.</div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="saveProfile()">
        💾 Save Changes
      </button>
      <button class="btn btn-secondary" onclick="goBack()">
        ⬅ Back to Dashboard
      </button>
    </div>
  </div>
</div>

<script>
  // ✅ Gateway path
  const API_USERS = "/users";

  // ✅ STANDARD AUTH KEYS
  const JWT_KEY = "jwt";
  const PHONE_KEY = "phone";

  const jwt = (localStorage.getItem(JWT_KEY) || "").trim();
  const phone = (localStorage.getItem(PHONE_KEY) || "").trim();

  function redirectToLogin() {
    localStorage.setItem("pendingTarget", "/edit-profile");
    window.location.href = "/SignuLogin?mode=login";
  }

  if (!jwt || !phone) {
    redirectToLogin();
  }

  function authHeaders(extra = {}) {
    return {
      ...(jwt ? { "Authorization": "Bearer " + jwt } : {}),
      ...extra
    };
  }

  document.getElementById("phoneLabel").textContent = "Signed in with: " + phone;
  document.getElementById("phone").value = phone;

  // ✅ Fetch profile (DO NOT populate password)
  fetch(API_USERS + "/profile?phone=" + encodeURIComponent(phone), {
    headers: authHeaders()
  })
    .then(res => {
      if (res.status === 401 || res.status === 403) {
        redirectToLogin();
        return Promise.reject(new Error("Unauthorized"));
      }
      if (!res.ok) throw new Error("Profile fetch failed");
      return res.json();
    })
    .then(user => {
      document.getElementById("firstName").value = user.firstName || "";
      document.getElementById("lastName").value  = user.lastName || "";
      document.getElementById("email").value     = user.email || "";
      document.getElementById("age").value       = user.age || "";
      document.getElementById("password").value  = ""; // ✅ never show password
    })
    .catch(() => {
      // avoid double alert if redirect happened
      if (window.location.pathname !== "/SignuLogin") {
        alert("Error loading profile");
      }
    });

  function togglePassword() {
    const pwdInput = document.getElementById("password");
    const toggle = document.querySelector(".toggle-password");
    if (pwdInput.type === "password") {
      pwdInput.type = "text";
      toggle.textContent = "Hide";
    } else {
      pwdInput.type = "password";
      toggle.textContent = "Show";
    }
  }

  function saveProfile() {
    const errorText = document.getElementById("errorText");
    if (errorText) errorText.style.display = "none";

    const firstName = document.getElementById("firstName").value.trim();
    const lastName  = document.getElementById("lastName").value.trim();
    const password  = document.getElementById("password").value.trim();

    // ✅ Password optional (only update if user entered)
    const body = {
      phone: phone,
      firstName: firstName,
      lastName: lastName
    };
    if (password) body.password = password;

    fetch(API_USERS + "/profile", {
      method: "PUT",
      headers: authHeaders({
        "Content-Type": "application/json"
      }),
      body: JSON.stringify(body)
    })
    .then(async res => {
      if (res.status === 401 || res.status === 403) {
        redirectToLogin();
        return Promise.reject(new Error("Unauthorized"));
      }

      let data = {};
      try { data = await res.json(); } catch(e) {}

      if (!res.ok) throw new Error(data.message || "Profile update failed");

      // keep UI name in storage for dashboard fallback
      localStorage.setItem("firstName", firstName);
      localStorage.setItem("lastName", lastName);

      alert(data.message || "Profile updated");
      document.getElementById("password").value = "";
    })
    .catch(() => alert("Error saving profile"));
  }

  function goBack() {
    window.location.href = "/aspcare";
  }

  // expose to HTML onclick handlers (if used)
  window.togglePassword = togglePassword;
  window.saveProfile = saveProfile;
  window.goBack = goBack;
</script>


</body>
</html>
