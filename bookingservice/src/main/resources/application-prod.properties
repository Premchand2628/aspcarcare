spring.datasource.url=${BOOKING_PROD_DB_URL}
spring.datasource.username=${BOOKING_PROD_DB_USERNAME}
spring.datasource.password=${BOOKING_PROD_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# QA/STG routing (activates RoutingDataSourceAutoConfig)
routing.qa.datasource.url=${QA_DB_URL}
routing.qa.datasource.username=${QA_DB_USERNAME}
routing.qa.datasource.password=${QA_DB_PASSWORD}
