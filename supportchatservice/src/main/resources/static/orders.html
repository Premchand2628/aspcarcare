<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Orders</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f2f2f2; }
    .navbar {
      background: #333; color: white; padding: 10px 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .navbar a { color: white; text-decoration: none; }
    .container {
      max-width: 1000px; margin: 30px auto; background: white;
      padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }
    .filter-bar {
      text-align: center; margin-bottom: 20px;
    }
    .filter-btn {
      padding: 8px 15px; margin: 5px; border: none; border-radius: 5px;
      cursor: pointer; background: #ddd; transition: background 0.3s;
    }
    .filter-btn.active { background: #333; color: white; }
    .filter-btn:hover { background: #555; color: white; }

    .order-card {
      display: flex; flex-direction: column;
      border: 1px solid #ddd; border-radius: 10px; padding: 15px;
      margin-bottom: 15px; background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .order-header {
      display: flex; align-items: center;
    }
    .order-header img {
      width: 100px; height: 100px; border-radius: 8px; margin-right: 20px;
      object-fit: cover;
    }
    .details { flex: 1; }
    .details h3 { margin: 0; font-size: 18px; }
    .details p { margin: 4px 0; color: #555; }
    .price { color: green; font-weight: bold; }

    /* Progress tracker */
    .tracker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 15px;
      position: relative;
    }
    .tracker::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 5%;
      right: 5%;
      height: 4px;
      background: #ccc;
      z-index: 1;
      transform: translateY(-50%);
    }
    .step {
      position: relative;
      z-index: 2;
      width: 25px;
      height: 25px;
      border-radius: 50%;
      background: #ccc;
      color: white;
      text-align: center;
      line-height: 25px;
      font-weight: bold;
    }
    .step.active {
      background: #28a745;
    }
    .tracker-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #555;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>My Orders</h2>
    <a href="index.html">🏠 Home</a>
  </div>

  <div class="container">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterOrders('All')">All</button>
      <button class="filter-btn" onclick="filterOrders('In Progress')">In Progress</button>
      <button class="filter-btn" onclick="filterOrders('In Transit')">In Transit</button>
      <button class="filter-btn" onclick="filterOrders('Delivered')">Delivered</button>
    </div>

    <div id="ordersContainer">
      <p>Loading your orders...</p>
    </div>
  </div>

  <script>
    const user = localStorage.getItem("userName") || "Guest User";
    let allOrders = [];

    function fetchOrders() {
      fetch("http://localhost:8082/api/orders/user/" + user)
        .then(res => res.json())
        .then(data => {
          allOrders = data;
          renderOrders("All");
        })
        .catch(err => {
          console.error("Error fetching orders:", err);
          document.getElementById("ordersContainer").innerHTML = "⚠️ Failed to load orders.";
        });
    }

    function filterOrders(status) {
      document.querySelectorAll(".filter-btn").forEach(btn => btn.classList.remove("active"));
      event.target.classList.add("active");
      renderOrders(status);
    }

    function renderOrders(filterStatus) {
      const c = document.getElementById("ordersContainer");
      let filtered = filterStatus === "All" ? allOrders : allOrders.filter(o => o.deliveryStatus === filterStatus);

      if (filtered.length === 0) {
        c.innerHTML = `<h3 style="text-align:center; color:#777;">No orders found for '${filterStatus}'.</h3>`;
        return;
      }

      c.innerHTML = "";
      filtered.forEach(o => {
        const trackerHTML = generateTracker(o.deliveryStatus);
        c.innerHTML += `
          <div class="order-card">
            <div class="order-header">
              <img src="${o.img}" alt="${o.title}">
              <div class="details">
                <h3>${o.title}</h3>
                <p><b>Qty:</b> ${o.qty}</p>
                <p class="price">$${o.subtotal.toFixed(2)}</p>
                <p><b>Order ID:</b> ${o.orderId}</p>
                <p><b>Payment:</b> ${o.paymentStatus}</p>
                <p><i>${new Date(o.createdAt).toLocaleString()}</i></p>
              </div>
            </div>
            ${trackerHTML}
          </div>
        `;
      });
    }

    // ✅ Generate visual progress tracker
    function generateTracker(status) {
      const progress = ["In Progress", "In Transit", "Delivered"];
      let activeIndex = progress.indexOf(status);

      return `
        <div class="tracker">
          <div class="step ${activeIndex >= 0 ? 'active' : ''}">1</div>
          <div class="step ${activeIndex >= 1 ? 'active' : ''}">2</div>
          <div class="step ${activeIndex >= 2 ? 'active' : ''}">3</div>
        </div>
        <div class="tracker-labels">
          <span>In Progress</span>
          <span>In Transit</span>
          <span>Delivered</span>
        </div>
      `;
    }

    fetchOrders();
  </script>
</body>
</html>
