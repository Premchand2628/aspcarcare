<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Profile</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f2f2f2; margin: 0; }

    /* Navbar */
    .navbar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      background: #333;
      padding: 10px 20px;
    }
    .navbar img {
      height: 32px;
      width: 32px;
      cursor: pointer;
    }
    .navbar span {
      color: #fff;
      margin-left: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    /* Profile Card */
    .profile-card {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
      margin: 50px auto;
      box-shadow: 0px 4px 8px rgba(0,0,0,0.2);
    }
    .profile-card h2 { text-align: center; margin-bottom: 20px; }
    .profile-field { margin: 15px 0; }
    .profile-field label { font-weight: bold; display: inline-block; width: 120px; }
    .profile-field span, .profile-field input {
      color: #333;
      font-size: 15px;
    }
    .profile-field input {
      padding: 5px;
      width: 200px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    .edit-btn, .save-btn, .cancel-btn {
      margin-top: 20px;
      padding: 10px 20px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: inline-block;
    }
    .edit-btn:hover, .save-btn:hover, .cancel-btn:hover { background: #555; }
  </style>
</head>
<body>
  <!-- Navbar with Home icon -->
  <div class="navbar">
    <img src="Home.jpg" alt="Home" onclick="goHome()">
    <!-- <span>My Profile</span> -->
  </div>

  <!-- Profile Card -->
  <div class="profile-card">
    <h2>My Profile</h2>

    <div class="profile-field">
      <label>Name:</label>
      <span id="name"></span>
      <input type="text" id="editName" style="display:none;">
    </div>

    <div class="profile-field">
      <label>Email:</label>
      <span id="email"></span>
      <!-- Email is read-only -->
    </div>
	
    <div class="profile-field">
      <label>Phone:</label>
      <span id="phone"></span>
      <input type="text" id="editPhone" style="display:none;">
    </div>

    <button class="edit-btn" id="editBtn" onclick="enableEdit()">Edit</button>
    <button class="save-btn" id="saveBtn" style="display:none;" onclick="saveProfile()">Save</button>
    <button class="cancel-btn" id="cancelBtn" style="display:none;" onclick="cancelEdit()">Cancel</button>
  </div>

  <script>
    let currentUser = null;

    // Fetch user details with session cookie
    fetch("/api/user/details", { credentials: "include" })
      .then(res => {
        if (res.status === 401) {
          alert("Session expired, please login again.");
          window.location.href = "login.html";
        }
        return res.json();
      })
      .then(user => {
        if (user) {
          currentUser = user;
          document.getElementById("name").innerText = user.name;
          document.getElementById("email").innerText = user.email;
          document.getElementById("phone").innerText = user.phone;
          document.getElementById("editName").value = user.name;
          document.getElementById("editPhone").value = user.phone;
        }
      })
      .catch(err => console.error("Error fetching profile:", err));

    function enableEdit() {
      document.getElementById("editBtn").style.display = "none";
      document.getElementById("saveBtn").style.display = "inline-block";
      document.getElementById("cancelBtn").style.display = "inline-block";

      document.getElementById("name").style.display = "none";
      document.getElementById("phone").style.display = "none";

      document.getElementById("editName").style.display = "inline-block";
      document.getElementById("editPhone").style.display = "inline-block";
    }

    function cancelEdit() {
      document.getElementById("editBtn").style.display = "inline-block";
      document.getElementById("saveBtn").style.display = "none";
      document.getElementById("cancelBtn").style.display = "none";

      document.getElementById("name").style.display = "inline";
      document.getElementById("phone").style.display = "inline";

      document.getElementById("editName").style.display = "none";
      document.getElementById("editPhone").style.display = "none";
    }

    function saveProfile() {
      const updatedUser = {
        name: document.getElementById("editName").value,
        phone: document.getElementById("editPhone").value
      };

      fetch("/api/user/update", {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(updatedUser),
        credentials: "include"
      })
      .then(res => res.text())
      .then(msg => {
        alert(msg);
        // Refresh UI
        document.getElementById("name").innerText = updatedUser.name;
        document.getElementById("phone").innerText = updatedUser.phone;
        cancelEdit();
      })
      .catch(err => console.error("Error updating profile:", err));
    }

    function goHome() {
      // 👇 Change filename if your Main UI page is different
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
