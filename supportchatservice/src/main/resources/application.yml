spring:
  config:
    import: optional:file:../env.properties
  application:
    name: support-chat-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${SUPPORT_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
    from: ${MAIL_FROM}

server:
  port: 8084

jwt:
  secret: ${JWT_SECRET:}
  issuer: ${JWT_ISSUER:}
  algorithm: ${JWT_ALGORITHM:HS256}
  public-key: ${JWT_PUBLIC_KEY:}
  access-token-minutes: 120

carwash:
  security:
    enabled: true

---
# =============================================
# QA profile — ASPCare_QA DB on port 9084
# =============================================
spring:
  config:
    activate:
      on-profile: qa
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_QA

server:
  port: 9084

---
# =============================================
# Prod profile — ASPCare_prod DB on port 10084
# =============================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/ASPCare_prod

server:
  port: 10084
